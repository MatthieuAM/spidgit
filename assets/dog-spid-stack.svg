<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 800">
  <defs>
    <linearGradient id="ssbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e85c00"/>
      <stop offset="100%" style="stop-color:#c84800"/>
    </linearGradient>
    <linearGradient id="spidcoin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4fd8"/>
      <stop offset="50%" style="stop-color:#c84dff"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
  </defs>
  <!-- Stack of SPID coins -->
  <ellipse cx="340" cy="600" rx="70" ry="22" fill="#8b1fbf"/>
  <rect x="270" y="548" width="140" height="52" rx="4" fill="url(#spidcoin)"/>
  <ellipse cx="340" cy="548" rx="70" ry="22" fill="#c84dff" stroke="#ffe97b" stroke-width="3"/>
  
  <rect x="270" y="496" width="140" height="52" rx="4" fill="url(#spidcoin)"/>
  <ellipse cx="340" cy="496" rx="70" ry="22" fill="#c84dff" stroke="#ffe97b" stroke-width="3"/>
  
  <rect x="270" y="444" width="140" height="52" rx="4" fill="url(#spidcoin)"/>
  <ellipse cx="340" cy="444" rx="70" ry="22" fill="#c84dff" stroke="#ffe97b" stroke-width="3"/>
  
  <!-- SPID text on coin -->
  <text x="340" y="454" text-anchor="middle" font-size="16" font-weight="900" fill="#ffe97b" font-family="sans-serif">SPID</text>
  
  <!-- Body -->
  <ellipse cx="220" cy="520" rx="100" ry="120" fill="url(#ssbody)"/>
  <ellipse cx="220" cy="545" rx="62" ry="80" fill="#fff8f0"/>
  <!-- Head -->
  <ellipse cx="220" cy="320" rx="100" ry="90" fill="url(#ssbody)"/>
  <ellipse cx="220" cy="338" rx="60" ry="54" fill="#fff8f0"/>
  <!-- Ears -->
  <ellipse cx="142" cy="270" rx="38" ry="50" fill="#c84800" transform="rotate(-15 142 270)"/>
  <ellipse cx="298" cy="270" rx="38" ry="50" fill="#c84800" transform="rotate(15 298 270)"/>
  <!-- Eyes -->
  <circle cx="196" cy="308" r="16" fill="#2d1500"/>
  <circle cx="244" cy="308" r="16" fill="#2d1500"/>
  <circle cx="202" cy="302" r="6" fill="white"/>
  <circle cx="250" cy="302" r="6" fill="white"/>
  <!-- Nose -->
  <ellipse cx="220" cy="346" rx="13" ry="9" fill="#1a0800"/>
  <path d="M206 360 Q220 374 234 360" fill="none" stroke="#1a0800" stroke-width="4" stroke-linecap="round"/>
  <!-- Arm reaching for coins -->
  <ellipse cx="315" cy="460" rx="26" ry="60" fill="url(#ssbody)" transform="rotate(-25 315 460)"/>
  <ellipse cx="342" cy="420" rx="22" ry="16" fill="#fff8f0"/>
  <!-- Other arm -->
  <ellipse cx="128" cy="500" rx="26" ry="55" fill="url(#ssbody)"/>
  <!-- Tail -->
  <path d="M310 620 Q280 690 310 730" fill="none" stroke="url(#ssbody)" stroke-width="32" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="185" cy="630" rx="26" ry="58" fill="url(#ssbody)"/>
  <ellipse cx="255" cy="630" rx="26" ry="58" fill="url(#ssbody)"/>
  <ellipse cx="185" cy="686" rx="30" ry="16" fill="#fff8f0"/>
  <ellipse cx="255" cy="686" rx="30" ry="16" fill="#fff8f0"/>
  <!-- Sparkles -->
  <text x="70" y="420" font-size="28" fill="#ffe97b">✦</text>
  <text x="400" y="340" font-size="22" fill="#ffe97b">✦</text>
</svg>