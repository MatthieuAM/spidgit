<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e85c00"/>
      <stop offset="100%" style="stop-color:#c84800"/>
    </linearGradient>
    <linearGradient id="wheel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe76f"/>
      <stop offset="100%" style="stop-color:#ffbc1f"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="200" cy="360" rx="90" ry="110" fill="url(#body)"/>
  <!-- White belly -->
  <ellipse cx="200" cy="380" rx="55" ry="70" fill="#fff8f0"/>
  <!-- Head -->
  <ellipse cx="200" cy="220" rx="90" ry="80" fill="url(#body)"/>
  <!-- White face patch -->
  <ellipse cx="200" cy="235" rx="52" ry="48" fill="#fff8f0"/>
  <!-- Ears -->
  <ellipse cx="130" cy="180" rx="35" ry="45" fill="#c84800" transform="rotate(-15 130 180)"/>
  <ellipse cx="270" cy="180" rx="35" ry="45" fill="#c84800" transform="rotate(15 270 180)"/>
  <!-- Eyes -->
  <circle cx="175" cy="215" r="14" fill="#2d1500"/>
  <circle cx="225" cy="215" r="14" fill="#2d1500"/>
  <circle cx="180" cy="210" r="5" fill="white"/>
  <circle cx="230" cy="210" r="5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="200" cy="248" rx="12" ry="8" fill="#1a0800"/>
  <!-- Mouth -->
  <path d="M188 260 Q200 272 212 260" fill="none" stroke="#1a0800" stroke-width="3" stroke-linecap="round"/>
  <!-- Wheel -->
  <circle cx="310" cy="320" r="65" fill="url(#wheel)" stroke="#c88600" stroke-width="8"/>
  <circle cx="310" cy="320" r="50" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- Wheel spokes -->
  <line x1="310" y1="255" x2="310" y2="385" stroke="#c88600" stroke-width="5"/>
  <line x1="245" y1="320" x2="375" y2="320" stroke="#c88600" stroke-width="5"/>
  <line x1="264" y1="274" x2="356" y2="366" stroke="#c88600" stroke-width="4"/>
  <line x1="356" y1="274" x2="264" y2="366" stroke="#c88600" stroke-width="4"/>
  <circle cx="310" cy="320" r="18" fill="#c88600"/>
  <!-- Paw raised -->
  <ellipse cx="295" cy="300" rx="22" ry="18" fill="url(#body)" transform="rotate(-30 295 300)"/>
  <!-- Tail -->
  <path d="M280 450 Q240 520 270 560 Q290 580 300 550" fill="none" stroke="url(#body)" stroke-width="28" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="165" cy="470" rx="22" ry="50" fill="url(#body)"/>
  <ellipse cx="235" cy="470" rx="22" ry="50" fill="url(#body)"/>
  <ellipse cx="165" cy="518" rx="26" ry="14" fill="#fff8f0"/>
  <ellipse cx="235" cy="518" rx="26" ry="14" fill="#fff8f0"/>
</svg>