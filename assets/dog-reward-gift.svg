<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="rgbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e85c00"/>
      <stop offset="100%" style="stop-color:#c84800"/>
    </linearGradient>
    <linearGradient id="giftgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff79e9"/>
      <stop offset="100%" style="stop-color:#be49ff"/>
    </linearGradient>
  </defs>
  <!-- Gift box -->
  <rect x="100" y="360" width="180" height="150" rx="12" fill="url(#giftgrad)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <rect x="90" y="330" width="200" height="44" rx="10" fill="url(#giftgrad)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- Ribbon vertical -->
  <rect x="178" y="330" width="24" height="180" rx="4" fill="#ffe97b"/>
  <!-- Ribbon horizontal -->
  <rect x="90" y="346" width="200" height="18" rx="4" fill="#ffe97b"/>
  <!-- Bow -->
  <ellipse cx="190" cy="328" rx="28" ry="16" fill="#ffe97b" transform="rotate(-20 190 328)"/>
  <ellipse cx="210" cy="328" rx="28" ry="16" fill="#ffe97b" transform="rotate(20 210 328)"/>
  <circle cx="200" cy="330" r="12" fill="#c88600"/>
  <!-- Stars -->
  <text x="60" y="360" font-size="20" fill="#ffe97b">✦</text>
  <text x="320" y="380" font-size="16" fill="#ffe97b">✦</text>
  <!-- Body -->
  <ellipse cx="200" cy="260" rx="80" ry="95" fill="url(#rgbody)"/>
  <ellipse cx="200" cy="278" rx="48" ry="62" fill="#fff8f0"/>
  <!-- Head -->
  <ellipse cx="200" cy="148" rx="80" ry="72" fill="url(#rgbody)"/>
  <ellipse cx="200" cy="162" rx="46" ry="42" fill="#fff8f0"/>
  <!-- Ears -->
  <ellipse cx="138" cy="110" rx="29" ry="38" fill="#c84800" transform="rotate(-15 138 110)"/>
  <ellipse cx="262" cy="110" rx="29" ry="38" fill="#c84800" transform="rotate(15 262 110)"/>
  <!-- Eyes -->
  <circle cx="178" cy="140" r="12" fill="#2d1500"/>
  <circle cx="222" cy="140" r="12" fill="#2d1500"/>
  <circle cx="183" cy="135" r="4" fill="white"/>
  <circle cx="227" cy="135" r="4" fill="white"/>
  <!-- Nose -->
  <ellipse cx="200" cy="170" rx="10" ry="7" fill="#1a0800"/>
  <path d="M189 181 Q200 192 211 181" fill="none" stroke="#1a0800" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms holding gift -->
  <ellipse cx="135" cy="290" rx="22" ry="55" fill="url(#rgbody)" transform="rotate(20 135 290)"/>
  <ellipse cx="265" cy="290" rx="22" ry="55" fill="url(#rgbody)" transform="rotate(-20 265 290)"/>
  <!-- Paw prints -->
  <ellipse cx="135" cy="330" rx="18" ry="12" fill="#fff8f0"/>
  <ellipse cx="265" cy="330" rx="18" ry="12" fill="#fff8f0"/>
</svg>