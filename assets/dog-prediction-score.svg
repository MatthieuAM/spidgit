<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="psbody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e85c00"/>
      <stop offset="100%" style="stop-color:#c84800"/>
    </linearGradient>
  </defs>
  <!-- Score board -->
  <rect x="40" y="300" width="200" height="130" rx="16" fill="#1a2a6c" stroke="#ffe97b" stroke-width="4"/>
  <text x="140" y="328" text-anchor="middle" font-size="14" font-weight="900" fill="#ffe97b" font-family="sans-serif">SCORE</text>
  <text x="140" y="370" text-anchor="middle" font-size="36" font-weight="900" fill="white" font-family="sans-serif">3-1</text>
  <text x="140" y="400" text-anchor="middle" font-size="13" fill="#57ef75" font-weight="900" font-family="sans-serif">TU AS GAGNÉ!</text>
  <!-- Body -->
  <ellipse cx="230" cy="390" rx="80" ry="100" fill="url(#psbody)"/>
  <ellipse cx="230" cy="408" rx="48" ry="64" fill="#fff8f0"/>
  <!-- Head -->
  <ellipse cx="230" cy="258" rx="82" ry="74" fill="url(#psbody)"/>
  <ellipse cx="230" cy="272" rx="47" ry="44" fill="#fff8f0"/>
  <!-- Ears -->
  <ellipse cx="166" cy="218" rx="30" ry="40" fill="#c84800" transform="rotate(-15 166 218)"/>
  <ellipse cx="294" cy="218" rx="30" ry="40" fill="#c84800" transform="rotate(15 294 218)"/>
  <!-- Eyes happy -->
  <path d="M208 248 Q215 240 222 248" fill="none" stroke="#2d1500" stroke-width="4" stroke-linecap="round"/>
  <path d="M238 248 Q245 240 252 248" fill="none" stroke="#2d1500" stroke-width="4" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="230" cy="280" rx="10" ry="7" fill="#1a0800"/>
  <!-- Big smile -->
  <path d="M210 295 Q230 315 250 295" fill="none" stroke="#1a0800" stroke-width="4" stroke-linecap="round"/>
  <!-- Pointing paw -->
  <ellipse cx="300" cy="340" rx="28" ry="22" fill="url(#psbody)" transform="rotate(-30 300 340)"/>
  <text x="310" y="308" font-size="24" fill="#57ef75">☝</text>
  <!-- Tail -->
  <path d="M300 480 Q280 530 300 560" fill="none" stroke="url(#psbody)" stroke-width="24" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="198" cy="476" rx="20" ry="45" fill="url(#psbody)"/>
  <ellipse cx="262" cy="476" rx="20" ry="45" fill="url(#psbody)"/>
  <ellipse cx="198" cy="519" rx="24" ry="12" fill="#fff8f0"/>
  <ellipse cx="262" cy="519" rx="24" ry="12" fill="#fff8f0"/>
</svg>